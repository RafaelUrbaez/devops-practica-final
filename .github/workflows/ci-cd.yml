name: Pipeline CI/CD DevOps

on:
  push:
    branches:
      - main 

jobs:
  build-and-test:
    name: Instalación y Pruebas
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v3

      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar pruebas unitarias
        run: npm test

  # Trabajo 2: Empaquetar y subir a Docker (Solo ocurre si el Trabajo 1 fue exitoso)
  docker-push:
    name: Construir y Subir a Docker Hub
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v3

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v2
        with:
          # Usamos "secretos" para no poner tus contraseñas aquí a la vista
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir y hacer Push de la imagen
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
         
          tags: ${{ secrets.DOCKER_USERNAME }}/hola-mundo-devops:latest

  deploy: # <--- Fíjate que tiene 2 espacios a la izquierda, alineado con docker-push
    name: Desplegar en Producción (Render)
    needs: docker-push
    runs-on: ubuntu-latest
    steps:
      - name: Disparar Webhook de Despliegue
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}